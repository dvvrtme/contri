<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greeting Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.12);
      max-width: 420px;
      width: 100%;
      padding: 32px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      margin-top: 16px;
      font-size: 16px;
    }
    button {
      margin-top: 20px;
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background: #1d4ed8;
    }
    .greeting {
      margin-top: 24px;
      font-size: 1.2rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Say Hello chal be mc</h1>
    <p>Type your name and I will greet you.</p>
    <input id="nameInput" type="text" placeholder="Your name" aria-label="Name" />
    <button id="greetButton">Greet me</button>
    <div id="greeting" class="greeting" aria-live="polite"></div>
  </div>
  <script>
    const nameInput = document.getElementById('nameInput');
    const greeting = document.getElementById('greeting');
    const button = document.getElementById('greetButton');

    button.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (name) {
        greeting.textContent = `Hello, ${name}! Welcome.`;
      } else {
        greeting.textContent = 'Please enter your name first.';
      }
    });

    nameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        button.click();
      }
    });
  </script>
</body>
</html>
